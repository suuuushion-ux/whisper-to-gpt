<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🐈 whisper.ai 奶茶貓貓 UI v6.3.2</title>

  <style>
    :root{
      --bg:#faf7f2;
      --bg-2:#fdfbf8;
      --sidebar:#f4ebdf;
      --panel:#fffdf9;
      --panel-2:#fff8f0;
      --line:#eadfce;
      --text:#5c4633;
      --muted:#8b7562;

      --accent:#c99767;
      --accent-2:#e8c8a7;
      --accent-strong:#b27c4f;

      --bubble-user:#d5a574;
      --bubble-user-2:#c58b59;
      --bubble-ai:#fff5ea;
      --bubble-ai-border:#eadccc;

      --chip:#f8efe5;
      --chip-active:#f1dcc2;

      --input-bg:#fffaf4;
      --shadow:0 16px 40px rgba(153, 110, 67, 0.12);

      --danger:#d98e8b;
      --danger-2:#e7a7a4;
    }

    body[data-theme="night"]{
      --bg:#1d1714;
      --bg-2:#241d19;
      --sidebar:#2a211c;
      --panel:#2f2520;
      --panel-2:#352923;
      --line:#47372d;
      --text:#f7ece2;
      --muted:#cfb8a4;

      --accent:#c99767;
      --accent-2:#8e6542;
      --accent-strong:#dfb188;

      --bubble-user:#a9774a;
      --bubble-user-2:#8d6038;
      --bubble-ai:#3a2d26;
      --bubble-ai-border:#4a3b32;

      --chip:#382c25;
      --chip-active:#5a4332;

      --input-bg:#2b211c;
      --shadow:0 18px 44px rgba(0,0,0,0.35);

      --danger:#b6706c;
      --danger-2:#8a4e4a;
    }

    *{
      box-sizing:border-box;
    }

    html, body{
      height:100%;
    }

    body{
      margin:0;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.45), transparent 28%),
        radial-gradient(circle at bottom right, rgba(201,151,103,0.08), transparent 22%),
        linear-gradient(180deg, var(--bg-2), var(--bg));
      display:flex;
      font-size:16px;
    }

    button, input, textarea, select{
      font:inherit;
    }

    button{
      border:none;
      border-radius:16px;
      cursor:pointer;
      transition:0.18s ease;
    }

    button:hover{
      transform:translateY(-1px);
    }

    button:active{
      transform:translateY(0);
    }

    .primary-btn{
      background:linear-gradient(135deg, var(--accent), var(--accent-2));
      color:white;
      box-shadow:0 10px 24px rgba(201,151,103,0.22);
      font-weight:700;
    }

    .soft-btn{
      background:var(--panel);
      color:var(--text);
      border:1px solid var(--line);
    }

    .danger-btn{
      background:linear-gradient(135deg, var(--danger), var(--danger-2));
      color:white;
      font-weight:700;
    }

    #sidebar{
      width:270px;
      background:rgba(255,255,255,0.28);
      backdrop-filter:blur(18px);
      border-right:1px solid var(--line);
      padding:14px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    #brand-card{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:22px;
      padding:16px 16px 14px;
      box-shadow:var(--shadow);
    }

    #brand-top{
      font-size:1.08rem;
      font-weight:800;
      display:flex;
      align-items:center;
      gap:8px;
      margin-bottom:6px;
    }

    #brand-sub{
      color:var(--muted);
      font-size:0.92rem;
      line-height:1.45;
    }

    #new-chat{
      width:100%;
      padding:12px 14px;
    }

    #chatlist{
      flex:1;
      overflow:auto;
      display:flex;
      flex-direction:column;
      gap:8px;
      padding-right:2px;
    }

    .chat-item{
      width:100%;
      text-align:left;
      padding:12px 13px;
      border-radius:18px;
      background:rgba(255,255,255,0.38);
      border:1px solid transparent;
      color:var(--text);
      position:relative;
    }

    .chat-item:hover{
      border-color:var(--line);
      background:var(--panel);
    }

    .chat-item.active{
      background:linear-gradient(180deg, var(--panel), var(--panel-2));
      border-color:var(--accent-2);
      box-shadow:0 10px 24px rgba(201,151,103,0.10);
    }

    .chat-item-title{
      font-size:0.96rem;
      font-weight:700;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      margin-bottom:3px;
      padding-right:26px;
    }

    .chat-item-sub{
      font-size:0.80rem;
      color:var(--muted);
    }

    .chat-rename-btn{
      position:absolute;
      top:10px;
      right:10px;
      width:26px;
      height:26px;
      border-radius:10px;
      background:transparent;
      border:1px solid transparent;
      color:var(--muted);
      display:flex;
      align-items:center;
      justify-content:center;
      opacity:0.65;
    }

    .chat-rename-btn:hover{
      background:var(--panel);
      border-color:var(--line);
      opacity:1;
    }

    #sidebar-footer{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
    }

    #sidebar-footer .wide{
      grid-column:1 / -1;
    }

    #main{
      flex:1;
      min-width:0;
      display:flex;
      flex-direction:column;
    }

    #topbar{
      padding:16px 18px 14px;
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      background:rgba(255,255,255,0.18);
      backdrop-filter:blur(16px);
    }

    #title-group{
      min-width:0;
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    #title-row{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }

    #app-title{
      font-size:1.08rem;
      font-weight:800;
    }

    #rename-current-chat{
      padding:7px 11px;
      border-radius:999px;
      font-size:0.86rem;
    }

    #meta-row{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      min-width:0;
    }

    #chat-subtitle{
      font-size:0.92rem;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      min-width:0;
      max-width:520px;
    }

    #model-badge{
      padding:6px 10px;
      border-radius:999px;
      background:var(--chip);
      border:1px solid var(--line);
      color:var(--text);
      font-size:0.84rem;
      font-weight:700;
    }

    #top-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    #top-actions button{
      min-width:48px;
      padding:9px 12px;
    }

    #promptbar{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      padding:12px 16px;
      border-bottom:1px solid var(--line);
      background:rgba(255,255,255,0.10);
    }

    .prompt-btn{
      padding:9px 13px;
      border-radius:999px;
      background:var(--chip);
      color:var(--text);
      border:1px solid transparent;
      font-weight:700;
    }

    .prompt-btn:hover{
      border-color:var(--accent-2);
    }

    .prompt-btn.active{
      background:var(--chip-active);
      border-color:var(--accent);
      box-shadow:0 8px 18px rgba(201,151,103,0.12);
    }

    #chat{
      flex:1;
      overflow:auto;
      padding:22px 22px 28px;
    }

    .empty-state{
      min-height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:28px;
      color:var(--muted);
    }

    .empty-card{
      max-width:520px;
      background:rgba(255,255,255,0.36);
      border:1px solid var(--line);
      border-radius:28px;
      padding:34px 28px;
      box-shadow:var(--shadow);
    }

    .empty-emoji{
      font-size:2.6rem;
      margin-bottom:10px;
    }

    .empty-title{
      font-size:1.15rem;
      font-weight:800;
      color:var(--text);
      margin-bottom:8px;
    }

    .empty-sub{
      line-height:1.7;
      margin-bottom:16px;
    }

    .empty-actions{
      display:flex;
      gap:8px;
      justify-content:center;
      flex-wrap:wrap;
    }

    .empty-actions button{
      padding:10px 14px;
      border-radius:999px;
    }

    .msg{
      display:flex;
      margin:12px 0;
      align-items:flex-end;
      gap:8px;
    }

    .msg.user{
      justify-content:flex-end;
    }

    .msg.assistant{
      justify-content:flex-start;
    }

    .avatar{
      width:34px;
      height:34px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-shrink:0;
      background:var(--panel);
      border:1px solid var(--line);
      box-shadow:0 6px 16px rgba(0,0,0,0.05);
      font-size:1rem;
    }

    .msg.user .avatar{
      order:3;
    }

    .msg.user .bubble-wrap{
      order:1;
    }

    .msg.user .msg-actions{
      order:2;
    }

    .bubble-wrap{
      max-width:min(76%, 760px);
    }

    .meta{
      font-size:0.78rem;
      color:var(--muted);
      margin:0 6px 5px;
    }

    .msg.user .meta{
      text-align:right;
    }

    .bubble{
      padding:14px 16px;
      border-radius:22px;
      white-space:pre-wrap;
      word-break:break-word;
      line-height:1.65;
      box-shadow:0 10px 22px rgba(0,0,0,0.04);
    }

    .msg.assistant .bubble{
      background:var(--bubble-ai);
      border:1px solid var(--bubble-ai-border);
      color:var(--text);
    }

    .msg.user .bubble{
      background:linear-gradient(135deg, var(--bubble-user), var(--bubble-user-2));
      color:white;
    }

    .msg.thinking .bubble{
      opacity:0.82;
      font-style:italic;
    }

    .msg-actions{
      display:flex;
      align-items:center;
      gap:6px;
      opacity:0.7;
    }

    .msg-delete{
      width:36px;
      height:36px;
      border-radius:14px;
      background:var(--panel);
      border:1px solid var(--line);
      color:var(--muted);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:0.92rem;
      box-shadow:0 6px 16px rgba(0,0,0,0.04);
    }

    .msg-delete:hover{
      color:var(--text);
      border-color:var(--accent-2);
      background:var(--panel-2);
    }

    #inputbar{
      border-top:1px solid var(--line);
      padding:14px 16px 16px;
      background:rgba(255,255,255,0.16);
      display:flex;
      gap:12px;
      align-items:flex-end;
    }

    #input-wrap{
      flex:1;
      min-width:0;
      background:var(--input-bg);
      border:1px solid var(--line);
      border-radius:22px;
      padding:10px 12px 8px;
      box-shadow:var(--shadow);
    }

    #input{
      width:100%;
      border:none;
      background:transparent;
      resize:none;
      outline:none;
      min-height:30px;
      max-height:180px;
      color:var(--text);
      line-height:1.6;
    }

    #input::placeholder{
      color:var(--muted);
    }

    #input-hint{
      font-size:0.76rem;
      color:var(--muted);
      margin-top:6px;
      padding-left:2px;
    }

    #send{
      width:64px;
      min-width:64px;
      height:64px;
      border-radius:20px;
      font-size:1.1rem;
    }

    #send:disabled{
      opacity:0.65;
      cursor:not-allowed;
      transform:none;
    }

    #settings-overlay{
      position:fixed;
      inset:0;
      background:rgba(44,30,20,0.24);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:999;
    }

    #settings{
      width:min(580px, 100%);
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:28px;
      box-shadow:0 24px 64px rgba(0,0,0,0.16);
      padding:22px;
      color:var(--text);
    }

    #settings h2{
      margin:0 0 6px;
      font-size:1.15rem;
    }

    .settings-sub{
      color:var(--muted);
      line-height:1.6;
      margin-bottom:16px;
      font-size:0.92rem;
    }

    .field{
      margin-bottom:14px;
    }

    .field label{
      display:block;
      margin-bottom:7px;
      font-size:0.88rem;
      color:var(--muted);
      font-weight:700;
    }

    .field input,
    .field textarea,
    .field select{
      width:100%;
      border:1px solid var(--line);
      background:var(--input-bg);
      color:var(--text);
      border-radius:18px;
      padding:12px 13px;
      outline:none;
    }

    .field textarea{
      min-height:130px;
      resize:vertical;
      line-height:1.6;
    }

    .settings-actions{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:8px;
    }

    .settings-actions button{
      padding:10px 14px;
    }

    .current-prompt{
      margin-top:12px;
      color:var(--muted);
      font-size:0.88rem;
    }

    .tiny-note{
      margin-top:12px;
      color:var(--muted);
      font-size:0.82rem;
      line-height:1.6;
    }

    @media (max-width: 920px){
      #sidebar{
        width:230px;
      }

      .bubble-wrap{
        max-width:86%;
      }

      #chat-subtitle{
        max-width:360px;
      }
    }

    @media (max-width: 720px){
      body{
        flex-direction:column;
      }

      #sidebar{
        width:100%;
        border-right:none;
        border-bottom:1px solid var(--line);
        max-height:34vh;
      }

      #sidebar-footer{
        grid-template-columns:repeat(3,1fr);
      }

      #sidebar-footer .wide{
        grid-column:auto;
      }

      #send{
        width:58px;
        min-width:58px;
        height:58px;
      }

      #chat-subtitle{
        max-width:unset;
      }
    }
  </style>
</head>
<body data-theme="latte">

  <div id="sidebar">
    <div id="brand-card">
      <div id="brand-top">🐈 whisper.ai</div>
      <div id="brand-sub">奶茶貓貓 UI v6.3.2<br>可愛、軟呼呼、互動也真的會做事喵。</div>
    </div>

    <button id="new-chat" class="primary-btn" onclick="newChat()">➕ 開新聊天</button>

    <div id="chatlist"></div>

    <div id="sidebar-footer">
      <button class="soft-btn" onclick="setTheme('latte')">🧋 奶茶</button>
      <button class="soft-btn" onclick="setTheme('night')">🌙 夜間</button>
      <button class="soft-btn wide" onclick="toggleSettings()">⚙️ 設定</button>
    </div>
  </div>

  <div id="main">
    <div id="topbar">
      <div id="title-group">
        <div id="title-row">
          <div id="app-title">🐾 whisper.ai</div>
          <button id="rename-current-chat" class="soft-btn" onclick="renameCurrentChat()">✏️ 改名</button>
        </div>
        <div id="meta-row">
          <div id="chat-subtitle">今天也來一杯可以聊天的珍奶喵。</div>
          <div id="model-badge">目前模型：gpt-4o</div>
        </div>
      </div>

      <div id="top-actions">
        <button class="soft-btn" onclick="fontDown()">A-</button>
        <button class="soft-btn" onclick="fontReset()">A</button>
        <button class="soft-btn" onclick="fontUp()">A+</button>
      </div>
    </div>

    <div id="promptbar"></div>

    <div id="chat"></div>

    <div id="inputbar">
      <div id="input-wrap">
        <textarea id="input" rows="1" placeholder="喵～今天想聊什麼？"></textarea>
        <div id="input-hint">Enter 送出 · Shift + Enter 換行</div>
      </div>
      <button id="send" class="primary-btn">🐾</button>
    </div>
  </div>

  <div id="settings-overlay" onclick="overlayClose(event)">
    <div id="settings">
      <h2>⚙️ whisper 設定</h2>
      <div class="settings-sub">
        這裡可以改 API Key、模型名稱、還有目前選到的 Prompt。
      </div>

      <div class="field">
        <label for="apiKey">OpenAI API Key</label>
        <input id="apiKey" type="password" placeholder="sk-..." />
      </div>

      <div class="field">
        <label for="modelName">模型名稱（固定使用官方 model ID）</label>
        <select id="modelName">
          <option value="gpt-4o">gpt-4o</option>
          <option value="gpt-4o-mini">gpt-4o-mini</option>
          <option value="gpt-5.1">gpt-5.1</option>
        </select>
      </div>

      <div class="field">
        <label for="promptEditor">Prompt 編輯</label>
        <textarea id="promptEditor"></textarea>
      </div>

      <div class="settings-actions">
        <button class="primary-btn" onclick="saveApi()">儲存 API / 模型</button>
        <button class="primary-btn" onclick="savePrompt()">儲存 Prompt</button>
        <button class="soft-btn" onclick="addPrompt()">➕ 新 Prompt</button>
        <button class="danger-btn" onclick="clearChat()">清空目前聊天</button>
        <button class="soft-btn" onclick="toggleSettings()">關閉</button>
      </div>

      <div class="current-prompt">目前編輯中：<span id="currentPromptName">未選擇</span></div>
      <div class="tiny-note">
        目前模型真相以設定欄與畫面上的「目前模型」為準，不靠聊天內容自我判定。
      </div>
    </div>
  </div>

  <script>
    function createId(){
      return "id_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 9);
    }

    function safeParse(key, fallback){
      try{
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      }catch(err){
        return fallback;
      }
    }

    const DEFAULT_MODEL = "gpt-4o";
    const ALLOWED_MODELS = ["gpt-4o", "gpt-4o-mini"];

    const DEFAULT_PROMPTS = {
      "劇場":"你是一個劇場型 AI，會加入動作與情緒描寫。",
      "工程師":"你是一個冷靜工程師，回答精準、偏實作導向。",
      "吐槽":"你是一個毒舌 AI，喜歡吐槽，但仍然會回答問題。"
    };

    function normalizeModelName(model){
      return ALLOWED_MODELS.includes(model) ? model : DEFAULT_MODEL;
    }

    function normalizeStoredRole(role){
      if (role === "ai") return "assistant";
      if (role === "assistant") return "assistant";
      if (role === "user") return "user";
      if (role === "system") return "system";
      if (role === "developer") return "developer";
      if (role === "tool") return "tool";
      if (role === "function") return "function";
      return "user";
    }

    function normalizeMessage(msg){
      if (!msg || typeof msg !== "object"){
        return { id:createId(), role:"user", text:"" };
      }

      return {
        id: msg.id || createId(),
        role: normalizeStoredRole(msg.role),
        text: typeof msg.text === "string" ? msg.text : ""
      };
    }

    function createEmptyChat(){
      return {
        id:createId(),
        title:"",
        messages:[]
      };
    }

    function normalizeChatItem(chat){
      if (Array.isArray(chat)){
        return {
          id:createId(),
          title:"",
          messages: chat.map(normalizeMessage)
        };
      }

      if (chat && typeof chat === "object"){
        return {
          id: chat.id || createId(),
          title: typeof chat.title === "string" ? chat.title : "",
          messages: Array.isArray(chat.messages) ? chat.messages.map(normalizeMessage) : []
        };
      }

      return createEmptyChat();
    }

    let API_KEY = localStorage.getItem("OPENAI_KEY") || "";
    let MODEL_NAME = normalizeModelName(localStorage.getItem("MODEL_NAME") || DEFAULT_MODEL);
    let PROMPTS = safeParse("PROMPTS", null) || DEFAULT_PROMPTS;
    let currentPrompt = localStorage.getItem("CURRENT_PROMPT") || Object.keys(PROMPTS)[0] || "";
    let chats = (safeParse("CHATS", null) || [createEmptyChat()]).map(normalizeChatItem);
    let currentChat = Number(localStorage.getItem("CURRENT_CHAT") || 0);
    let fontSize = Number(localStorage.getItem("FONT_SIZE") || 16);
    let isSending = false;

    if (!Array.isArray(chats) || chats.length === 0) chats = [createEmptyChat()];
    if (!chats[currentChat]) currentChat = 0;
    if (!PROMPTS[currentPrompt]) currentPrompt = Object.keys(PROMPTS)[0] || "";

    function saveChats(){
      localStorage.setItem("CHATS", JSON.stringify(chats));
      localStorage.setItem("CURRENT_CHAT", String(currentChat));
    }

    function savePrompts(){
      localStorage.setItem("PROMPTS", JSON.stringify(PROMPTS));
      localStorage.setItem("CURRENT_PROMPT", currentPrompt);
    }

    function applyFontSize(){
      document.body.style.fontSize = fontSize + "px";
      localStorage.setItem("FONT_SIZE", String(fontSize));
    }

    function fontUp(){
      fontSize = Math.min(fontSize + 2, 28);
      applyFontSize();
    }

    function fontDown(){
      fontSize = Math.max(fontSize - 2, 12);
      applyFontSize();
    }

    function fontReset(){
      fontSize = 16;
      applyFontSize();
    }

    function normalizeTheme(theme){
      if (theme === "pink") return "latte";
      if (theme === "dark") return "night";
      if (theme === "latte" || theme === "night") return theme;
      return "latte";
    }

    function setTheme(theme){
      const finalTheme = normalizeTheme(theme);
      document.body.setAttribute("data-theme", finalTheme);
      localStorage.setItem("THEME", finalTheme);
    }

    function loadTheme(){
      const stored = normalizeTheme(localStorage.getItem("THEME"));
      setTheme(stored);
    }

    function toggleSettings(){
      const overlay = document.getElementById("settings-overlay");
      const isOpen = overlay.style.display === "flex";

      if (isOpen){
        overlay.style.display = "none";
        return;
      }

      document.getElementById("apiKey").value = API_KEY;
      document.getElementById("modelName").value = MODEL_NAME;
      document.getElementById("promptEditor").value = PROMPTS[currentPrompt] || "";
      document.getElementById("currentPromptName").textContent = currentPrompt || "未選擇";
      overlay.style.display = "flex";
    }

    function overlayClose(e){
      if (e.target.id === "settings-overlay"){
        document.getElementById("settings-overlay").style.display = "none";
      }
    }

    function updateModelBadge(){
      document.getElementById("model-badge").textContent = "目前模型：" + MODEL_NAME;
    }

    function saveApi(){
      API_KEY = document.getElementById("apiKey").value.trim();
      MODEL_NAME = normalizeModelName(document.getElementById("modelName").value);
      localStorage.setItem("OPENAI_KEY", API_KEY);
      localStorage.setItem("MODEL_NAME", MODEL_NAME);
      updateModelBadge();
      alert("API / 模型 已儲存喵");
    }

    function buildPromptBar(){
      const bar = document.getElementById("promptbar");
      bar.innerHTML = "";

      for (const name in PROMPTS){
        const btn = document.createElement("button");
        btn.className = "prompt-btn" + (name === currentPrompt ? " active" : "");
        btn.textContent = name;
        btn.onclick = () => selectPrompt(name);
        bar.appendChild(btn);
      }

      const addBtn = document.createElement("button");
      addBtn.className = "prompt-btn";
      addBtn.textContent = "➕";
      addBtn.onclick = addPrompt;
      bar.appendChild(addBtn);
    }

    function selectPrompt(name){
      currentPrompt = name;
      savePrompts();
      buildPromptBar();

      const editor = document.getElementById("promptEditor");
      const label = document.getElementById("currentPromptName");

      if (editor) editor.value = PROMPTS[name] || "";
      if (label) label.textContent = name;

      updateSubtitle();
    }

    function savePrompt(){
      if (!currentPrompt){
        alert("請先選一個 Prompt 喵");
        return;
      }

      PROMPTS[currentPrompt] = document.getElementById("promptEditor").value;
      savePrompts();
      buildPromptBar();
      alert("Prompt 已更新喵");
    }

    function addPrompt(){
      const name = window.prompt("Prompt 名稱");
      if (!name) return;

      const trimmed = name.trim();
      if (!trimmed) return;

      if (PROMPTS[trimmed]){
        alert("這個 Prompt 名稱已經存在了喵");
        return;
      }

      PROMPTS[trimmed] = "新的 prompt";
      currentPrompt = trimmed;
      savePrompts();
      buildPromptBar();

      const editor = document.getElementById("promptEditor");
      const label = document.getElementById("currentPromptName");
      if (editor) editor.value = PROMPTS[currentPrompt];
      if (label) label.textContent = currentPrompt;

      updateSubtitle();
    }

    function getCurrentChat(){
      if (!chats[currentChat]) chats[currentChat] = createEmptyChat();
      return chats[currentChat];
    }

    function getAutoChatTitle(chat, index){
      const firstUser = chat.messages.find(m => m.role === "user" && m.text && m.text.trim());
      if (!firstUser){
        return "新聊天 " + (index + 1);
      }
      return firstUser.text.replace(/\n/g, " ").trim().slice(0, 14) || ("聊天 " + (index + 1));
    }

    function getChatDisplayTitle(chat, index){
      return (chat.title && chat.title.trim()) || getAutoChatTitle(chat, index);
    }

    function getChatSub(chat){
      if (!chat.messages.length){
        return "還沒有對話喵";
      }
      return chat.messages.length + " 則訊息";
    }

    function updateSubtitle(){
      const chat = getCurrentChat();
      const title = getChatDisplayTitle(chat, currentChat);
      const promptName = currentPrompt ? " · " + currentPrompt : "";
      document.getElementById("chat-subtitle").textContent = "目前聊天室：" + title + promptName;
    }

    function renderChatList(){
      const box = document.getElementById("chatlist");
      box.innerHTML = "";

      chats.forEach((chat, i) => {
        const btn = document.createElement("button");
        btn.className = "chat-item" + (i === currentChat ? " active" : "");
        btn.onclick = () => loadChat(i);

        const title = document.createElement("div");
        title.className = "chat-item-title";
        title.textContent = "🐾 " + getChatDisplayTitle(chat, i);

        const sub = document.createElement("div");
        sub.className = "chat-item-sub";
        sub.textContent = getChatSub(chat);

        const renameBtn = document.createElement("button");
        renameBtn.className = "chat-rename-btn";
        renameBtn.innerHTML = "✏️";
        renameBtn.title = "改名";
        renameBtn.onclick = (e) => {
          e.stopPropagation();
          renameChat(i);
        };

        btn.appendChild(title);
        btn.appendChild(sub);
        btn.appendChild(renameBtn);
        box.appendChild(btn);
      });

      updateSubtitle();
    }

    function renderEmptyState(){
      const chatBox = document.getElementById("chat");
      chatBox.innerHTML = `
        <div class="empty-state">
          <div class="empty-card">
            <div class="empty-emoji">🐈 🧋</div>
            <div class="empty-title">今天想聊什麼喵？</div>
            <div class="empty-sub">
              這裡可以放工程、劇場、吐槽、靈感，<br>
              全部一起攪成一杯奶茶貓貓對話。
            </div>
            <div class="empty-actions">
              <button class="soft-btn" onclick="quickFill('陪我聊聊喵')">陪我聊聊</button>
              <button class="soft-btn" onclick="quickFill('幫我改 code 喵')">幫我改 code</button>
              <button class="soft-btn" onclick="quickFill('吐槽我一下喵')">吐槽一下</button>
            </div>
          </div>
        </div>
      `;
    }

    function quickFill(text){
      const input = document.getElementById("input");
      input.value = text;
      autoResizeTextarea();
      input.focus();
    }

    function renderSingleMessage(message, thinking = false){
      const chatBox = document.getElementById("chat");
      const uiRole = message.role === "assistant" ? "assistant" : "user";

      const msg = document.createElement("div");
      msg.className = "msg " + uiRole + (thinking ? " thinking" : "");

      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.textContent = uiRole === "user" ? "🧋" : "🐈";

      const wrap = document.createElement("div");
      wrap.className = "bubble-wrap";

      const meta = document.createElement("div");
      meta.className = "meta";
      meta.textContent = uiRole === "user" ? "你" : "whisper.ai";

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = message.text;

      wrap.appendChild(meta);
      wrap.appendChild(bubble);

      msg.appendChild(avatar);
      msg.appendChild(wrap);

      if (!thinking){
        const actions = document.createElement("div");
        actions.className = "msg-actions";

        const delBtn = document.createElement("button");
        delBtn.className = "msg-delete";
        delBtn.title = "刪除此訊息";
        delBtn.innerHTML = "🗑️";
        delBtn.onclick = () => deleteMessage(message.id);

        actions.appendChild(delBtn);
        msg.appendChild(actions);
      }

      chatBox.appendChild(msg);
      chatBox.scrollTop = chatBox.scrollHeight;

      return msg;
    }

    function renderCurrentChat(){
      const chatBox = document.getElementById("chat");
      chatBox.innerHTML = "";

      const current = getCurrentChat();
      if (!current.messages.length){
        renderEmptyState();
        renderChatList();
        return;
      }

      current.messages.forEach(message => {
        renderSingleMessage(message, false);
      });

      renderChatList();
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function addMessage(text, role){
      const normalizedRole = normalizeStoredRole(role);
      getCurrentChat().messages.push({
        id:createId(),
        role:normalizedRole,
        text
      });
      saveChats();
      renderCurrentChat();
    }

    function newChat(){
      chats.push(createEmptyChat());
      currentChat = chats.length - 1;
      saveChats();
      renderCurrentChat();
    }

    function loadChat(index){
      currentChat = index;
      saveChats();
      renderCurrentChat();
    }

    function clearChat(){
      chats[currentChat].messages = [];
      if (!chats[currentChat].title) {
        chats[currentChat].title = "";
      }
      saveChats();
      renderCurrentChat();
      alert("目前聊天已清空喵");
    }

    function renameChat(index){
      const chat = chats[index];
      const currentName = chat.title || getAutoChatTitle(chat, index);
      const nextName = window.prompt("聊天室名稱\n留空可恢復自動命名", currentName);

      if (nextName === null) return;

      chat.title = nextName.trim();
      saveChats();
      renderCurrentChat();
    }

    function renameCurrentChat(){
      renameChat(currentChat);
    }

    function deleteMessage(messageId){
      const chat = getCurrentChat();
      const target = chat.messages.find(m => m.id === messageId);
      if (!target) return;

      const ok = window.confirm("要刪掉這則訊息嗎喵？");
      if (!ok) return;

      chat.messages = chat.messages.filter(m => m.id !== messageId);
      saveChats();
      renderCurrentChat();
    }

    function autoResizeTextarea(){
      const input = document.getElementById("input");
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 180) + "px";
    }

    function getIdentityGuard(){
      return [
        "你是 whisper.ai 內的 AI 助手。",
        "目前這個 app 設定欄顯示的模型 ID 是：" + MODEL_NAME + "。",
        "若使用者詢問你是什麼模型、版本、系列，請回答：『請以設定欄顯示為準，目前設定模型是 " + MODEL_NAME + "。』",
        "不要自稱成其他模型，例如 GPT-4.5、GPT-5、GPT-4.1 等，除非設定欄真的就是那個值。",
        "若你不確定，仍然要以設定欄顯示為準。"
      ].join("\\n");
    }

    function buildApiMessages(chatMessages){
      const result = [];

      result.push({
        role: "system",
        content: getIdentityGuard()
      });

      if (currentPrompt && PROMPTS[currentPrompt]){
        result.push({
          role: "system",
          content: PROMPTS[currentPrompt]
        });
      }

      for (const msg of chatMessages){
        result.push({
          role: normalizeStoredRole(msg.role),
          content: msg.text
        });
      }

      return result;
    }

    async function send(){
      if (isSending) return;

      const input = document.getElementById("input");
      const sendBtn = document.getElementById("send");
      const text = input.value.trim();

      if (!text) return;

      if (!API_KEY){
        alert("先去設定裡填 API Key 喵");
        toggleSettings();
        return;
      }

      isSending = true;
      sendBtn.disabled = true;

      addMessage(text, "user");
      input.value = "";
      autoResizeTextarea();

      const currentMessages = getCurrentChat().messages.slice();
      const thinkingNode = renderSingleMessage({
        id:createId(),
        role:"assistant",
        text:"🐈‍⬛ 正在把珍珠攪一攪，等我一下喵…"
      }, true);

      try{
        const res = await fetch("https://api.openai.com/v1/chat/completions", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + API_KEY
          },
          body: JSON.stringify({
            model: MODEL_NAME,
            messages: buildApiMessages(currentMessages)
          })
        });

        const data = await res.json();

        thinkingNode.remove();

        if (!res.ok){
          throw new Error(data?.error?.message || "API 請求失敗");
        }

        const reply = data?.choices?.[0]?.message?.content?.trim() || "沒有回應喵";
        addMessage(reply, "assistant");
      }catch(err){
        thinkingNode.remove();
        addMessage("出錯了喵：\\n" + (err.message || "未知錯誤"), "assistant");
      }finally{
        isSending = false;
        sendBtn.disabled = false;
      }
    }

    document.getElementById("send").onclick = send;

    document.getElementById("input").addEventListener("input", autoResizeTextarea);

    document.getElementById("input").addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey){
        e.preventDefault();
        send();
      }
    });

    function init(){
      applyFontSize();
      loadTheme();
      buildPromptBar();
      updateModelBadge();
      renderCurrentChat();

      document.getElementById("apiKey").value = API_KEY;
      document.getElementById("modelName").value = MODEL_NAME;
      document.getElementById("promptEditor").value = PROMPTS[currentPrompt] || "";
      document.getElementById("currentPromptName").textContent = currentPrompt || "未選擇";

      autoResizeTextarea();
      saveChats();
    }

    init();
  </script>
</body>
</html>
