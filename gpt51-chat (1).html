<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="whisper">
<meta name="theme-color" content="#0a0a0c">
<title>whisper</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0c;
  --surface: #131316;
  --surface2: #1c1c21;
  --border: #252530;
  --accent: #a594f9;
  --text: #ededf5;
  --text-dim: #666680;
  --user-bg: #1a1830;
  --user-border: rgba(165,148,249,0.2);
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans TC', sans-serif;
  -webkit-font-smoothing: antialiased;
}

#app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  padding-top: var(--safe-top);
}

#topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 18px 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.title { font-size: 17px; font-weight: 500; letter-spacing: 0.04em; }
.title span { color: var(--accent); }

.icon-btn {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-dim);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.15s;
}
.icon-btn:active { background: var(--border); }

#drawer {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.3s cubic-bezier(0.4,0,0.2,1);
  flex-shrink: 0;
}
#drawer.open { max-height: 230px; }

#drawer-inner {
  padding: 14px 18px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.field-label {
  font-size: 10px; color: var(--text-dim);
  letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px;
}

.field-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 13px;
  color: var(--text);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 14px;
  outline: none;
  -webkit-appearance: none;
}
.field-input:focus { border-color: var(--accent); }
.field-input::placeholder { color: var(--text-dim); }

#messages {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 16px 16px 8px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  -webkit-overflow-scrolling: touch;
  scroll-behavior: smooth;
}
#messages::-webkit-scrollbar { display: none; }

#empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  opacity: 0.25;
  pointer-events: none;
  padding-bottom: 60px;
}
#empty .glyph { font-size: 40px; }
#empty p { font-size: 13px; color: var(--text-dim); text-align: center; line-height: 1.6; }

.msg { display: flex; gap: 9px; animation: rise 0.22s ease both; }
@keyframes rise {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.msg.user { flex-direction: row-reverse; }

.av {
  width: 28px; height: 28px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  margin-top: 2px;
}
.msg.user .av { background: var(--accent); }
.msg.ai .av {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--accent);
  font-size: 11px; font-weight: 500;
}

.bubble {
  max-width: min(78%, 480px);
  padding: 10px 14px;
  border-radius: 16px;
  font-size: 15px;
  line-height: 1.65;
  white-space: pre-wrap;
  word-break: break-word;
}
.msg.user .bubble {
  background: var(--user-bg);
  border: 1px solid var(--user-border);
  border-bottom-right-radius: 4px;
}
.msg.ai .bubble {
  background: var(--surface);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}

.typing { display: flex; gap: 5px; align-items: center; padding: 2px 0; }
.typing i {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--text-dim);
  animation: pulse 1.1s infinite;
  font-style: normal; display: block;
}
.typing i:nth-child(2) { animation-delay: 0.18s; }
.typing i:nth-child(3) { animation-delay: 0.36s; }
@keyframes pulse {
  0%,80%,100% { opacity: 0.2; transform: scale(0.85); }
  40% { opacity: 1; transform: scale(1); }
}

.err { color: #f07070; font-size: 13px; }

#inputwrap {
  padding: 10px 14px;
  padding-bottom: calc(10px + var(--safe-bottom));
  background: var(--bg);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

#input-row {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 8px 8px 8px 14px;
  transition: border-color 0.2s;
}
#input-row:focus-within { border-color: var(--accent); }

#user-input {
  flex: 1;
  background: transparent;
  border: none; outline: none;
  color: var(--text);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 15px;
  line-height: 1.5;
  resize: none;
  max-height: 120px;
  overflow-y: auto;
  padding: 3px 0;
  -webkit-appearance: none;
}
#user-input::placeholder { color: var(--text-dim); }
#user-input::-webkit-scrollbar { display: none; }

#send-btn {
  width: 36px; height: 36px;
  border-radius: 12px;
  background: var(--accent);
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: opacity 0.2s, transform 0.1s;
  -webkit-tap-highlight-color: transparent;
}
#send-btn:active { transform: scale(0.9); }
#send-btn:disabled { opacity: 0.3; }

#history-bar {
  text-align: center;
  font-size: 11px;
  color: var(--text-dim);
  padding: 5px 0 0;
  letter-spacing: 0.02em;
  min-height: 18px;
}
</style>
</head>
<body>
<div id="app">

  <div id="topbar">
    <div class="title">whisper <span>·</span> gpt</div>
    <div style="display:flex;gap:8px">
      <div class="icon-btn" id="clear-btn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      </div>
      <div class="icon-btn" id="settings-btn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </div>
    </div>
  </div>

  <div id="drawer">
    <div id="drawer-inner">
      <div>
        <div class="field-label">API Key</div>
        <input type="password" id="api-key-input" class="field-input" placeholder="sk-..." autocomplete="off" />
      </div>
      <div>
        <div class="field-label">模型</div>
        <select id="model-select" class="field-input">
          <option value="gpt-5.1">gpt-5.1</option>
          <option value="gpt-4.1">gpt-4.1</option>
          <option value="gpt-4o">gpt-4o</option>
        </select>
      </div>
      <div>
        <div class="field-label">系統提示詞（選填）</div>
        <textarea id="system-prompt" class="field-input" rows="2" placeholder="你是溫柔自然的聊天夥伴，不說教，不念經。" style="resize:none;line-height:1.5"></textarea>
      </div>
    </div>
  </div>

  <div id="messages">
    <div id="empty">
      <div class="glyph">🌙</div>
      <p>點右上角齒輪設定 API key<br>對話記錄會自動保存</p>
    </div>
  </div>

  <div id="inputwrap">
    <div id="input-row">
      <textarea id="user-input" placeholder="說點什麼…" rows="1"></textarea>
      <button id="send-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
        </svg>
      </button>
    </div>
    <div id="history-bar"></div>
  </div>

</div>

<script>
const STORAGE_KEY = 'whisper_history';
const KEY_STORE = 'whisper_apikey';
const MODEL_STORE = 'whisper_model';
const SYS_STORE = 'whisper_system';

const apiKeyInput = document.getElementById('api-key-input');
const modelSelect = document.getElementById('model-select');
const systemPrompt = document.getElementById('system-prompt');
const messagesEl = document.getElementById('messages');
const emptyEl = document.getElementById('empty');
const userInput = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const clearBtn = document.getElementById('clear-btn');
const settingsBtn = document.getElementById('settings-btn');
const drawer = document.getElementById('drawer');
const historyBar = document.getElementById('history-bar');

let history = [];

// 設定持久化
function loadSettings() {
  const k = localStorage.getItem(KEY_STORE);
  const m = localStorage.getItem(MODEL_STORE);
  const s = localStorage.getItem(SYS_STORE);
  if (k) apiKeyInput.value = k;
  if (m) modelSelect.value = m;
  if (s) systemPrompt.value = s;
}
apiKeyInput.addEventListener('input', () => localStorage.setItem(KEY_STORE, apiKeyInput.value));
modelSelect.addEventListener('change', () => localStorage.setItem(MODEL_STORE, modelSelect.value));
systemPrompt.addEventListener('input', () => localStorage.setItem(SYS_STORE, systemPrompt.value));

// 對話持久化
function saveHistory() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(history)); } catch(e) {}
}

function loadHistory() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    history = JSON.parse(raw);
    if (!history.length) return;
    if (emptyEl.parentNode) emptyEl.remove();
    history.forEach(m => renderBubble(m.role === 'user' ? 'user' : 'ai', m.content, false));
    updateBar();
    scrollBottom();
  } catch(e) { history = []; }
}

function updateBar() {
  const turns = Math.floor(history.length / 2);
  historyBar.textContent = turns > 0 ? `已保存 ${turns} 輪對話` : '';
}

// 齒輪
settingsBtn.addEventListener('click', () => drawer.classList.toggle('open'));

// 清除
clearBtn.addEventListener('click', () => {
  if (!confirm('清除所有對話記錄？')) return;
  history = [];
  saveHistory();
  messagesEl.innerHTML = '';
  messagesEl.appendChild(emptyEl);
  updateBar();
});

// 輸入框高度
userInput.addEventListener('input', () => {
  userInput.style.height = 'auto';
  userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
});
userInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
sendBtn.addEventListener('click', send);

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderBubble(role, content, animate = true) {
  if (emptyEl.parentNode) emptyEl.remove();
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  if (!animate) div.style.animation = 'none';
  div.innerHTML = `<div class="av">${role === 'user' ? '🐾' : 'AI'}</div><div class="bubble">${esc(content)}</div>`;
  messagesEl.appendChild(div);
  return div;
}

function renderTyping() {
  if (emptyEl.parentNode) emptyEl.remove();
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.innerHTML = `<div class="av">AI</div><div class="bubble"><div class="typing"><i></i><i></i><i></i></div></div>`;
  messagesEl.appendChild(div);
  scrollBottom();
  return div;
}

function scrollBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

async function send() {
  const text = userInput.value.trim();
  if (!text) return;
  const key = apiKeyInput.value.trim();
  if (!key) { drawer.classList.add('open'); apiKeyInput.focus(); return; }

  userInput.value = '';
  userInput.style.height = 'auto';
  sendBtn.disabled = true;

  renderBubble('user', text);
  history.push({ role: 'user', content: text });

  const typing = renderTyping();

  const messages = [];
  const sys = systemPrompt.value.trim();
  if (sys) messages.push({ role: 'system', content: sys });
  messages.push(...history);

  try {
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${key}`
      },
      body: JSON.stringify({ model: modelSelect.value, messages })
    });
    const data = await res.json();
    typing.remove();

    if (!res.ok) {
      const div = renderBubble('ai', '');
      div.querySelector('.bubble').innerHTML = `<span class="err">❌ ${esc(data?.error?.message || 'HTTP ' + res.status)}</span>`;
      history.pop();
    } else {
      const reply = data.choices?.[0]?.message?.content || '（沒有回應）';
      renderBubble('ai', reply);
      history.push({ role: 'assistant', content: reply });
      saveHistory();
      updateBar();
    }
  } catch(e) {
    typing.remove();
    const div = renderBubble('ai', '');
    div.querySelector('.bubble').innerHTML = `<span class="err">❌ 網路錯誤：${esc(e.message)}</span>`;
    history.pop();
  }

  sendBtn.disabled = false;
  scrollBottom();
}

loadSettings();
loadHistory();
window.addEventListener('resize', () => setTimeout(scrollBottom, 100));
</script>
</body>
</html>
